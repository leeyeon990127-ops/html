<html>
    <body>
        <img id="image" src="../images/coffee.jpg" width="120" height="100">
        <script>
            status = 1
            function changeImage() {
                if(status == 1) {
                    document.getElementById("image").src="../images/lattee.jpg"
                    status = 2
                }else{
                    document.getElementById("image").src="../images/coffee.jpg";
                    status = 1
                }
            }
        </script>
        <input type="button" onclick="changeImage()" value="click!"/>
    </body>
</html>
