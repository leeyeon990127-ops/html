<!DOCTYPE HTML>
<html>
    <head>
        <meta charset = "utf-8"/>
    </head>
    <body>
        <script>
            for (var i = 0; i < 10; i++) { 
                if (i === 5) {
                    continue;  //5를 건너뛰고(0~4, 6~9)출력
                }
                document.write('coding' + i + '<br>');
            }
        </script>
    </body>
</html>
